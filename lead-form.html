<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Course - Lead Capture</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
        }

        /* Basic custom select arrow */
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--primary-color);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .message {
            display: none;
            text-align: center;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-weight: 500;
        }

        .message.success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: block;
        }

        .message.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block;
        }

        #success-state {
            display: none;
            text-align: center;
            padding: 2rem 0;
        }

        #success-state svg {
            width: 64px;
            height: 64px;
            color: var(--success-color);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="form-container">
            <div class="header">
                <h1>Level Up with AI</h1>
                <p>Register your interest to get early access</p>
            </div>
            
            <form id="lead-form">
                <input type="hidden" name="source" value="website">
                
                <div class="form-group">
                    <label for="name">Full Name *</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" required placeholder="john@example.com">
                </div>
                
                <div class="form-group">
                    <label for="interest">Area of Interest *</label>
                    <select id="interest" name="interest" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="AI">AI</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Machine Learning">Machine Learning</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="budget">Budget *</label>
                    <select id="budget" name="budget" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="timeline">Timeline *</label>
                    <select id="timeline" name="timeline" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="Just exploring">Just exploring</option>
                        <option value="1 month">1 month</option>
                        <option value="Immediate">Immediate</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="intent">Intent *</label>
                    <select id="intent" name="intent" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="Just exploring">Just exploring</option>
                        <option value="Want to learn more">Want to learn more</option>
                        <option value="Comparing options">Comparing options</option>
                        <option value="Ready to start soon">Ready to start soon</option>
                        <option value="Need urgently">Need urgently</option>
                    </select>
                </div>
                
                <button type="submit" id="submit-btn" aria-live="polite">Submit Registration</button>
            </form>
            
            <div id="status-message" class="message"></div>
        </div>

        <div id="success-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h2>Thank You!</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Your registration has been successfully received.</p>
        </div>
    </div>

    <script>
        document.getElementById('lead-form').addEventListener('submit', async function(e) {
            e.preventDefault(); // Prevent default reload behavior
            
            const form = e.target;
            const submitBtn = document.getElementById('submit-btn');
            const statusMessage = document.getElementById('status-message');
            const formContainer = document.getElementById('form-container');
            const successState = document.getElementById('success-state');
            
            // Basic UI Updates for loading state
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            statusMessage.className = 'message';
            statusMessage.textContent = '';
            statusMessage.style.display = 'none';

            // Collect form data into JSON object
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                // Send POST request to n8n webhook
                const response = await fetch('https://vivek23149.app.n8n.cloud/webhook-test/2229014d-9ffb-44b4-bbb3-3093dd9eaac4', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    // Show success state hide form
                    formContainer.style.display = 'none';
                    successState.style.display = 'block';
                } else {
                    throw new Error(`Server returned ${response.status} status`);
                }
            } catch (error) {
                console.error('Submission error:', error);
                
                // Show error message and re-enable button
                statusMessage.className = 'message error';
                statusMessage.textContent = 'Failed to submit. Ensure n8n is running properly, then try again.';
                statusMessage.style.display = 'block';
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Registration';
            }
        });
    </script>
</body>
</html>
